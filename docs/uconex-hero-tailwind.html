<!-- ============================================
     UCONEX HERO - VERSIÓN TAILWIND CSS
     
     INSTRUCCIONES PARA CLAUDE CODE:
     
     1. El grid pattern se maneja con CSS puro via 
        @layer utilities o un archivo CSS aparte.
        Tailwind NO tiene clases nativas para este 
        tipo de background pattern.
     
     2. Copia el bloque <style> en tu archivo CSS 
        global (o en globals.css si usas Astro/Next)
     
     3. El componente usa clases Tailwind estándar 
        + las clases custom para el grid.
     ============================================ -->

<!-- 
  ========================================
  PASO 1: Agregar esto a tu CSS global
  (globals.css, base.css, o tailwind.css)
  ========================================
-->
<style>
/* 
  Agregar en tu archivo CSS global:
  
  @tailwind base;
  @tailwind components;
  @tailwind utilities;
*/

/* Grid Pattern - CSS custom (no existe en Tailwind) */
@layer utilities {
    .bg-grid-pattern {
        --grid-color: rgba(255, 255, 255, 0.06);
        background-image:
            linear-gradient(
                0deg,
                transparent 24%,
                var(--grid-color) 25%,
                var(--grid-color) 26%,
                transparent 27%,
                transparent 74%,
                var(--grid-color) 75%,
                var(--grid-color) 76%,
                transparent 77%,
                transparent
            ),
            linear-gradient(
                90deg,
                transparent 24%,
                var(--grid-color) 25%,
                var(--grid-color) 26%,
                transparent 27%,
                transparent 74%,
                var(--grid-color) 75%,
                var(--grid-color) 76%,
                transparent 77%,
                transparent
            );
        background-size: 60px 60px;
    }

    /* Variantes de tamaño del grid */
    .bg-grid-sm { background-size: 35px 35px; }
    .bg-grid-md { background-size: 50px 50px; }
    .bg-grid-lg { background-size: 60px 60px; }
    .bg-grid-xl { background-size: 80px 80px; }

    /* Fade del grid hacia abajo */
    .mask-fade-down {
        -webkit-mask-image: linear-gradient(
            to bottom,
            rgba(0, 0, 0, 1) 0%,
            rgba(0, 0, 0, 0.7) 30%,
            rgba(0, 0, 0, 0.3) 50%,
            rgba(0, 0, 0, 0) 70%
        );
        mask-image: linear-gradient(
            to bottom,
            rgba(0, 0, 0, 1) 0%,
            rgba(0, 0, 0, 0.7) 30%,
            rgba(0, 0, 0, 0.3) 50%,
            rgba(0, 0, 0, 0) 70%
        );
    }

    /* Variantes de dirección del fade */
    .mask-fade-up {
        -webkit-mask-image: linear-gradient(to top, black 0%, black 30%, transparent 70%);
        mask-image: linear-gradient(to top, black 0%, black 30%, transparent 70%);
    }

    .mask-fade-center {
        -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
        mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
    }

    /* Glow effect */
    .glow-purple {
        background: radial-gradient(
            ellipse at center,
            rgba(124, 58, 237, 0.4) 0%,
            rgba(124, 58, 237, 0.15) 30%,
            rgba(124, 58, 237, 0.05) 50%,
            transparent 70%
        );
        filter: blur(40px);
    }
}
</style>


<!-- 
  ========================================
  PASO 2: El componente Hero en HTML/Tailwind
  ========================================
-->
